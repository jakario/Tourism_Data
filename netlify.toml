[build]
  publish = "public"
  command = """
    mkdir -p public netlify/functions/data &&
    cp templates/index.html public/index.html &&
    cp data/tourism_cache.db netlify/functions/data/tourism_cache.db
  """

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
